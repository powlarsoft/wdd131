<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Album</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Merriweather&display=swap" rel="stylesheet">
  <!-- Mobile-first CSS -->
  <link rel="stylesheet" href="styles/temples.css">
  <!-- Larger view CSS -->
  <link rel="stylesheet" href="styles/temples-large.css">
  <!-- JavaScript -->
  <script src="scripts/temples.js" defer></script>
</head>
<body>
  <header>
    <h1>Temple Album</h1>
    <button id="hamburger">&#9776;</button>
    <nav>
      <a href="#">Home</a>
      <a href="#">Old</a>
      <a href="#">New</a>
      <a href="#">Large</a>
      <a href="#">Small</a>
    </nav>
  </header>

  <main>
    <h1>Home</h1>
    <section class="album">
      <figure>
        <img src="images/500px-2019_San_Diego_LDS_Temple_1.jpg" alt="San Diego California Temple">
        <figcaption>San Diego California Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Salt_Lake_Temple,_Utah_-_Sept_2004.jpg" alt="Salt Lake Temple">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Ghana_Mission_247.jpg" alt="Accra Ghana Temple">
        <figcaption>Accra Ghana Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Columbia_South_Carolina_Temple_Entrance.jpg" alt="Columbia South Carolina Temple">
        <figcaption>Columbia South Carolina Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-RomeTempleatSunset.jpg" alt="Rome Italy Temple">
        <figcaption>Rome Italy Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Temple_mormon_de_Paris_au_Chesnay_le_8_avril_2017_-_36.jpg" alt="Paris France Temple">
        <figcaption>Paris France Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Tokyo_Temple.jpg" alt="Tokyo Japan Temple">
        <figcaption>Tokyo Japan Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Mexico_city_temple_night.jpg" alt="Mexico City Temple">
        <figcaption>Mexico City Temple</figcaption>
      </figure>
      <figure>
        <img src="images/500px-Manila_Philippines_Temple_-_Whiting.jpg" alt="Manila Philippines Temple">
        <figcaption>Manila Philippines Temple</figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Powell Nana 🌸 Nigeria 🌸</p>
    <p>Last Modification: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
